# Dependabot version updates.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # npm dependencies (package.json / package-lock.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Supply-chain guard: only propose releases that are at least a week old,
    # so a compromised package version is likely to have been yanked before
    # Dependabot ever opens (and auto-merge merges) a PR for it.
    cooldown:
      default-days: 7
    # Bundle minor + patch bumps into a single PR to cut noise; the CI build
    # check gates each PR, so grouped low-risk updates can be merged in one go.
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the workflows in .github/workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Same one-week cooldown as npm, for the same supply-chain reason.
    cooldown:
      default-days: 7
