name: CI

# Verifies the site still compiles. Runs on every pull request (including
# Dependabot's) and on pushes to branches other than `main` (pushes to `main`
# are already covered by the Deploy workflow's build step).
on:
  pull_request:
  push:
    # Dependabot branches are excluded because their PRs already trigger the
    # pull_request run — otherwise every Dependabot PR builds twice.
    branches-ignore: [ main, 'dependabot/**' ]
  workflow_dispatch:

# A newer commit on the same branch/PR cancels the in-progress run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Build site
        run: npm run build

      # A successful compile can still produce a broken site (a route silently
      # dropped, the analytics tag lost in a Layout refactor). Guard the things
      # a green build alone doesn't prove.
      - name: Smoke-check build output
        run: |
          for page in index.html staffroom/index.html brands/index.html courses/index.html flyer/index.html; do
            test -s "dist/$page" || { echo "::error::dist/$page is missing or empty"; exit 1; }
          done
          grep -q 'plausible' dist/index.html || { echo "::error::Plausible analytics tag missing from home page"; exit 1; }
          grep -q 'https://maria-montserrat.com' dist/index.html || { echo "::error::canonical domain missing from home page"; exit 1; }
